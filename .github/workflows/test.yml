name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: functions
        run: npm ci
      - name: Build
        working-directory: functions
        run: npm run build
      - name: Run tests
        working-directory: functions
        run: npm test
